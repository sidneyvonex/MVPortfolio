# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - sidneymvportfolio-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Prepare deployment package
        # Copy package.json and the compiled dist/ into a clean deploy/ folder.
        # Azure will extract this as wwwroot — no subdirectory, so "cd server" is not needed.
        run: |
          mkdir -p ../deploy
          cp package.json ../deploy/
          cp -r dist ../deploy/
          # Include node_modules so Azure doesn't need to reinstall at runtime
          cp -r node_modules ../deploy/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Upload the flattened deploy folder — its CONTENTS become wwwroot
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6B2142626645474D8FC45E88BF428CDF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C6D80D9578094D339229FC8138835A02 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_137118ED03484581B2DD77D3E2DBFB06 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sidneymvportfolio-backend'
          slot-name: 'Production'
          # Deploy the flat folder — Azure places these files directly in wwwroot
          package: deploy
